<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Your built app -->
    <script type="module" crossorigin src="./assets/index--t5PLDKS.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-CeQYuxiB.css" />
  </head>

  <body>
    <div id="root"></div>

    <!-- EmailJS -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <script>
      (function () {
        // Init EmailJS (Public Key)
        emailjs.init("UPrY5GUd40w7Haz5y");

        function attachEmailHandler() {
          const form = document.querySelector("form");
          if (!form) return false;

          // Prevent attaching multiple times
          if (form.dataset.emailjsBound === "1") return true;
          form.dataset.emailjsBound = "1";

          form.addEventListener("submit", function (e) {
            e.preventDefault();

            // Inputs (try name first, then ids, then generic fallbacks)
            const firstNameEl =
              form.querySelector("[name='firstName']") ||
              form.querySelector("[name='first_name']") ||
              form.querySelector("#firstName") ||
              form.querySelector("#first_name");

            const lastNameEl =
              form.querySelector("[name='lastName']") ||
              form.querySelector("[name='last_name']") ||
              form.querySelector("#lastName") ||
              form.querySelector("#last_name");

            const emailEl =
              form.querySelector("[name='email']") ||
              form.querySelector("#email") ||
              form.querySelector("input[type='email']");

            const subjectEl =
              form.querySelector("[name='subject']") ||
              form.querySelector("#subject");

            const messageEl =
              form.querySelector("[name='message']") ||
              form.querySelector("#message") ||
              form.querySelector("textarea");

            const templateParams = {
              first_name: firstNameEl ? firstNameEl.value : "",
              last_name: lastNameEl ? lastNameEl.value : "",
              email: emailEl ? emailEl.value : "",
              subject: subjectEl ? subjectEl.value : "",
              message: messageEl ? messageEl.value : ""
            };

            emailjs
              .send("service_28gj19l", "template_dpfs4di", templateParams)
              .then(function () {
                alert("Message sent successfully!");
                form.reset();
              })
              .catch(function () {
                alert("Failed to send message. Please try again.");
              });
          });

          return true;
        }

        // Try immediately
        if (attachEmailHandler()) return;

        // Observe DOM until form appears
        const observer = new MutationObserver(function () {
          if (attachEmailHandler()) observer.disconnect();
        });

        observer.observe(document.documentElement, { childList: true, subtree: true });
      })();
    </script>

    <!-- Work Section Injector (Videos, Canva Designs, Photoshop Edits)

    <script defer src="./assets/work-section.js"></script>
  </body>
