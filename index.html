    <div id="root"></div>

    <!-- EmailJS -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <script>
      (function () {
        // Init EmailJS (Public Key)
        emailjs.init("UPrY5GUd40w7Haz5y");

        function attachEmailHandler() {
          const form = document.querySelector("form");
          if (!form) return false;

          // Prevent attaching multiple times
          if (form.dataset.emailjsBound === "1") return true;
          form.dataset.emailjsBound = "1";

          form.addEventListener("submit", function (e) {
            e.preventDefault();

            // Inputs (try name first, then ids, then generic fallbacks)
            const firstNameEl =
              form.querySelector("[name='firstName']") ||
              form.querySelector("[name='first_name']") ||
              form.querySelector("#firstName") ||
              form.querySelector("#first_name");

            const lastNameEl =
              form.querySelector("[name='lastName']") ||
              form.querySelector("[name='last_name']") ||
              form.querySelector("#lastName") ||
              form.querySelector("#last_name");

            const emailEl =
              form.querySelector("[name='email']") ||
              form.querySelector("#email") ||
              form.querySelector("input[type='email']");

            const subjectEl =
              form.querySelector("[name='subject']") ||
              form.querySelector("#subject");

            const messageEl =
              form.querySelector("[name='message']") ||
              form.querySelector("#message") ||
              form.querySelector("textarea");

            const templateParams = {
              first_name: firstNameEl ? firstNameEl.value : "",
              last_name: lastNameEl ? lastNameEl.value : "",
              email: emailEl ? emailEl.value : "",
              subject: subjectEl ? subjectEl.value : "",
              message: messageEl ? messageEl.value : ""
            };

            emailjs
              .send("service_28gj19l", "template_dpfs4di", templateParams)
              .then(function () {
                alert("Message sent successfully!");
                form.reset();
              })
              .catch(function () {
                alert("Failed to send message. Please try again.");
              });
          });

          return true;
        }

        // Try immediately
        if (attachEmailHandler()) return;

        // Observe DOM until form appears
        const observer = new MutationObserver(function () {
          if (attachEmailHandler()) observer.disconnect();
        });

        observer.observe(document.documentElement, { childList: true, subtree: true });
      })();
    </script>

    <!-- Work Section Injector (Videos, Canva Designs, Photoshop Edits) -->
    <script defer src="./assets/work-section.js"></script>
    <!-- Certificate Section Injector -->
    <script defer src="./assets/certificates-section.js"></script>
    <!-- Rename Portfolio tab to Sample Works and link it to the Work section -->
    <script defer src="./assets/tools-append.js"></script>
    <script>
      (function () {
        // Common IDs your Work section might use
        const possibleIds = ["work", "works", "sample-works", "sampleworks", "portfolio"];

        function findWorkTarget() {
          // 1) Try common IDs first
          for (const id of possibleIds) {
            const el = document.getElementById(id);
            if (el) return el;
          }

          // 2) Fallback: locate a heading containing "Sample Works" / "Work" / "Portfolio"
          const headings = Array.from(document.querySelectorAll("h1,h2,h3"));
          const h = headings.find((x) => {
            const t = (x.textContent || "").trim().toLowerCase();
            return (
              t.includes("sample works") ||
              t.includes("sample work") ||
              t === "work" ||
              t.includes("portfolio")
            );
          });

          if (h) return h.closest("section, main, div") || h;

          return null;
        }

        function scrollToWork() {
          const target = findWorkTarget();
          if (!target) return false;

          target.scrollIntoView({ behavior: "smooth", block: "start" });

          // Keep a consistent hash (even if the real id is different)
          try {
            history.replaceState(null, "", "#work");
          } catch (e) {}

          return true;
        }

        function applyNavFix() {
          // Find links/buttons that say "Portfolio" and convert them
          const candidates = Array.from(document.querySelectorAll("a, button"));
          let changed = false;

          candidates.forEach((el) => {
            const text = (el.textContent || "").trim().toLowerCase();

            // Handle both "portfolio" and already "sample works"
            if (text === "portfolio" || text === "sample works") {
              el.textContent = "Sample Works";

              // If it's an <a>, set href to #work (for semantics)
              if (el.tagName.toLowerCase() === "a") {
                el.setAttribute("href", "#work");
              }

              // Prevent binding multiple times
              if (el.dataset.workBound === "1") {
                changed = true;
                return;
              }
              el.dataset.workBound = "1";

              // Ensure click scrolls even if React/Injector renders late
              el.addEventListener("click", function (e) {
                e.preventDefault();

                // Try immediately
                if (scrollToWork()) return;

                // Retry briefly if target isn't in DOM yet
                let attempts = 0;
                const maxAttempts = 20;
                const timer = setInterval(() => {
                  attempts += 1;
                  if (scrollToWork() || attempts >= maxAttempts) clearInterval(timer);
                }, 200);
              });

              changed = true;
            }
          });

          return changed;
        }

        // React renders async, so retry a few times
        let tries = 0;
        const maxTries = 40;

        const t = setInterval(() => {
          const ok = applyNavFix();
          tries += 1;

          // Stop once found OR after max tries
          if (ok || tries >= maxTries) clearInterval(t);
        }, 250);
      })();
    </script>
  </body>
